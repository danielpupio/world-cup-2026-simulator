name: Fix subdivision flags

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix-flags:
    if: ${{ !contains(github.event.head_commit.message, 'Fix England and Scotland flag emojis') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Replace black flags with subdivision flag sequences
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('src/App.jsx')
          text = path.read_text()
          text = text.replace('"Escócia": "🏴"', '"Escócia": "\\u{1F3F4}\\u{E0067}\\u{E0062}\\u{E0073}\\u{E0063}\\u{E0074}\\u{E007F}"')
          text = text.replace('"Inglaterra": "🏴"', '"Inglaterra": "\\u{1F3F4}\\u{E0067}\\u{E0062}\\u{E0065}\\u{E006E}\\u{E0067}\\u{E007F}"')
          path.write_text(text)
          PY

      - name: Commit fix
        run: |
          if git diff --quiet; then
            echo "No flag changes needed."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/App.jsx
          git commit -m "Fix England and Scotland flag emojis"
          git push
